services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiagency
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: aiagency
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiagency"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
