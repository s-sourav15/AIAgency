name: Ahvan
options:
  bundleIdPrefix: com.ahvan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

targets:
  Ahvan:
    type: application
    platform: iOS
    sources:
      - path: Ahvan
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Ahvan/Resources
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: "Ahvan"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Gemini API key — set in Info.plist or as env variable
        GEMINI_API_KEY: "$(GEMINI_API_KEY)"
    info:
      path: Ahvan/Info.plist
      properties:
        CFBundleDisplayName: "Ahvan"
        GEMINI_API_KEY: "$(GEMINI_API_KEY)"
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
    entitlements:
      path: Ahvan/Ahvan.entitlements
